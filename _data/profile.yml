short_bio: >-
  <p>
    I am a Senior Algorithm Engineer at <strong>Alibaba</strong> based in Chaoyang, Beijing, specializing in <strong>Ranking</strong>, <strong>Recommendation Systems</strong>, and <strong>Supply Chain Optimization</strong>. I hold a Master's degree in Computer Architecture from the Institute of Computing Technology (<strong>ICT</strong>), Chinese Academy of Sciences (<strong>UCAS</strong>), and a Bachelor's degree in Software Engineering from Shandong University (<strong>SDU</strong>). My work focuses on building robust, large-scale recommendation engines for complex travel and e-commerce scenarios. I am passionate about developing innovative deep learning models to address challenges in user intent modeling, cross-scenario transfer learning, and commercial revenue optimization, consistently driving significant growth in GMV and online efficiency.
  </p>

